spring:
  application:
    name: notion-api
  datasource:
    url: ${POSTGRESQL_URL:jdbc:postgresql://localhost:5432/cp_db}
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

notion:
  version: 2026-03-11
  base-url: https://api.notion.com
  client-id: ${NOTION_CLIENT_ID}
  client-secret: ${NOTION_CLIENT_SECRET}
  auth-url: https://api.notion.com/v1/oauth/authorize
  token-url: /v1/oauth/token
  redirect-uri: http://localhost:8080/notion/oauth/callback

google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
  redirect-uri: http://localhost:8080/google/oauth/callback
  auth-uri: https://accounts.google.com/o/oauth2/v2/auth
  token-url: https://oauth2.googleapis.com/token

gmail:
  gmail-api-base-url: https://gmail.googleapis.com

atlassian:
  client-id: ${ATLASSIAN_CLIENT_ID}
  client-secret: ${ATLASSIAN_CLIENT_SECRET}
  redirect-uri: http://localhost:8080/atlassian/oauth/callback
  auth-uri: https://auth.atlassian.com/authorize
  token-uri: https://auth.atlassian.com/oauth/token
  accessible-resources-uri: https://api.atlassian.com/oauth/token/accessible-resources
  user-identifier-uri: https://api.atlassian.com/me
